</div>

<div class="seccion">
  <h2>Datos del cliente</h2>
  <div class="fila"><span class="label">Cliente</span><span class="valor" id="cliente"></span></div>
  <div class="fila"><span class="label">CUIT</span><span class="valor" id="cuit"></span></div>
  <div class="fila"><span class="label">Fecha</span><span class="valor" id="fecha"></span></div>
</div>

<div class="seccion">
  <h2>Detalle del pedido</h2>
  <div class="fila" id="row-medias" style="display:none"><span class="label">Medias</span><span class="valor" id="medias"></span></div>
  <div class="fila" id="row-cortes" style="display:none"><span class="label">Cortes</span><span class="valor" id="cortes"></span></div>
  <div class="fila"><span class="label">KG netos</span><span class="valor" id="kgneto"></span></div>
  <div class="fila"><span class="label">Precio x KG final</span><span class="valor" id="preciokg"></span></div>
  <div class="total"><span>Importe total</span><span id="total"></span></div>
</div>

<div class="seccion">
  <h2>Facturación</h2>
  <div class="fila"><span class="label">KG a facturar</span><span class="valor" id="kgfact"></span></div>
  <div class="fila"><span class="label">% Facturación</span><span class="valor" id="pctfact"></span></div>
  <div class="fila"><span class="label">Precio x kg a facturar</span><span class="valor" id="preciofact"></span></div>
  <div class="fila"><span class="label">Monto factura</span><span class="valor" id="montofactura"></span></div>
  <div class="diferencia"><span>Diferencia Cta Cte 2</span><span id="diferencia"></span></div>
</div>

<button class="btn-print no-print" onclick="window.print()">Imprimir / Guardar PDF</button>

<script>
const p = new URLSearchParams(window.location.search);
const fmt = (n) => n ? '$' + parseFloat(n).toLocaleString('es-AR', {minimumFractionDigits:0, maximumFractionDigits:0}) : '-';
const fmtKg = (n) => n ? parseFloat(n).toLocaleString('es-AR') + ' kg' : '-';

document.getElementById('cliente').textContent = p.get('cliente') || '-';
document.getElementById('cuit').textContent = p.get('cuit') || '-';
document.getElementById('fecha').textContent = p.get('fecha') || '-';
document.getElementById('kgneto').textContent = fmtKg(p.get('kgneto'));
document.getElementById('preciokg').textContent = fmt(p.get('preciokg'));
document.getElementById('total').textContent = fmt(p.get('total'));
document.getElementById('kgfact').textContent = fmtKg(p.get('kgneto'));
document.getElementById('pctfact').textContent = p.get('pctfact') ? parseFloat(p.get('pctfact')).toFixed(0) + '%' : '-';
document.getElementById('preciofact').textContent = fmt(p.get('preciofact'));
document.getElementById('montofactura').textContent = fmt(p.get('montofactura'));
document.getElementById('diferencia').textContent = fmt(p.get('diferencia'));

if(p.get('medias') && parseFloat(p.get('medias')) > 0) {
  document.getElementById('row-medias').style.display = 'flex';
  document.getElementById('medias').textContent = p.get('medias') + ' u.';
}
if(p.get('cortes') && parseFloat(p.get('cortes')) > 0) {
  document.getElementById('row-cortes').style.display = 'flex';
  document.getElementById('cortes').textContent = p.get('cortes') + ' u.';
}
</script>
